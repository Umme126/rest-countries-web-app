<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Finder</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="app-container">
        <header>
            <h1>Global Finder</h1>
            <p>Explore data points across global nations</p>
            <input type="text" id="search-input" placeholder="Search country by name..." disabled>
        </header>

        <main>
            <div id="loader" class="loader"></div>

            <div id="error-message" class="error-container hidden">
                <p class="error-text">❌ Oops! Failed to load country records. Please check your internet connection or try again.</p>
                <button onclick="fetchCountries()" class="retry-btn">Retry Connection</button>
            </div>

            <div id="countries-grid" class="countries-grid"></div>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
